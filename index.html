<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Precalculus Unit 3.8: The Tangent Function (Advanced)</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
  .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  h1 { text-align: center; color: #2c3e50; font-size: 28px;}
  .question-block { margin-bottom: 30px; padding: 20px; border-left: 5px solid #3498db; background-color: #fdfdfd; border-radius: 0 8px 8px 0; }
  .question-text { font-weight: bold; font-size: 16px; margin-bottom: 15px; line-height: 1.5;}
  .options label { display: block; margin: 10px 0; cursor: pointer; padding: 10px; border-radius: 4px; transition: background 0.2s; border: 1px solid transparent;}
  .options label:hover { background-color: #eef2f5; border: 1px solid #dcdcdc; }
  button { display: block; width: 100%; padding: 15px; font-size: 18px; color: white; background-color: #3498db; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; transition: 0.3s;}
  button:hover { background-color: #2980b9; }
  #score-display { margin-top: 25px; font-weight: bold; font-size: 20px; text-align: center; padding: 15px; border-radius: 5px; display: none; }
  .solution-box { margin-top: 15px; padding: 15px; background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; border-radius: 5px; display: none; font-size: 15px; line-height: 1.5;}
  .solution-box strong { color: #d32f2f; }
  .correct-highlight { background-color: #d4edda !important; border: 1px solid #c3e6cb !important; font-weight: bold; }
  .incorrect-highlight { background-color: #f8d7da !important; border: 1px solid #f5c6cb !important; color: #721c24; text-decoration: line-through;}
</style>
</head>
<body>

<div class="container">
  <h1>Unit 3.8: The Tangent Function (AP Level)</h1>
  <p style="text-align:center; margin-bottom: 30px; color: #555;">Select the best answer for each question. Detailed solutions will appear for any incorrect answers.</p>
  
  <div id="quiz-container"></div>

  <button type="button" id="submit-btn" onclick="gradeQuiz()">Submit & Grade Quiz</button>
  <div id="score-display"></div>
</div>

<script>
// Quiz Data Array - Easy to update and add more questions!
const quizData = [
  {
    q: "1. What is the period of the function f(x) = -2tan(&pi;/3(x - 1)) + 5?",
    opts: { A: "&pi;/3", B: "3", C: "6", D: "2&pi;/3" },
    ans: "B",
    sol: "The period of a tangent function f(x) = a tan(b(x-c)) + d is found using the formula Period = &pi; / |b|. Here, b = &pi;/3. Therefore, Period = &pi; / (&pi;/3) = 3."
  },
  {
    q: "2. Which of the following represents the vertical asymptotes of g(x) = tan(2x - &pi;/2) for any integer k?",
    opts: { A: "x = &pi;/4 + (&pi;/2)k", B: "x = &pi;/2 + (&pi;/2)k", C: "x = &pi;/2 + &pi;k", D: "x = &pi;k" },
    ans: "B",
    sol: "The parent function tan(&theta;) has asymptotes at &theta; = &pi;/2 + &pi;k. Set the argument of the function equal to this: 2x - &pi;/2 = &pi;/2 + &pi;k. Adding &pi;/2 to both sides gives 2x = &pi; + &pi;k. Dividing everything by 2 yields x = &pi;/2 + (&pi;/2)k."
  },
  {
    q: "3. Consider h(x) = -4tan(x). Which limit accurately describes the end behavior of h(x) as x approaches &pi;/2 from the left?",
    opts: { A: "Limit as x &rarr; (&pi;/2)&#x207B; is &infin;", B: "Limit as x &rarr; (&pi;/2)&#x207B; is -&infin;", C: "Limit as x &rarr; (&pi;/2)&#x207B; is 0", D: "The limit does not exist" },
    ans: "B",
    sol: "For the parent function tan(x), as x approaches &pi;/2 from the left, the graph shoots up to positive infinity. However, h(x) has a leading coefficient of -4, which vertically reflects the graph over the x-axis. Therefore, the limit changes from &infin; to -&infin;."
  },
  {
    q: "4. On the interval (0, &pi;/2), which of the following statements is true about the graph of y = tan(x)?",
    opts: { A: "It is increasing and concave up.", B: "It is increasing and concave down.", C: "It is decreasing and concave up.", D: "It is decreasing and concave down." },
    ans: "A",
    sol: "The tangent function is strictly increasing on all intervals within its domain. Between x = 0 and the asymptote at x = &pi;/2, the slopes of the tangent lines are positive and getting progressively steeper, which means the rate of change is increasing. Thus, it is increasing and concave up."
  },
  {
    q: "5. How many solutions does the equation tan(3x) = 2 have on the interval [0, 2&pi;)?",
    opts: { A: "2", B: "3", C: "6", D: "Infinite" },
    ans: "C",
    sol: "The period of tan(3x) is &pi;/3. The total length of the given interval [0, 2&pi;) is 2&pi;. To find how many full periods fit in this interval, divide the total length by the period: 2&pi; / (&pi;/3) = 6 full periods. Since the tangent function crosses any horizontal line (like y=2) exactly once per period, there are exactly 6 solutions."
  },
  {
    q: "6. A tangent function of the form f(x) = a tan(b(x-c)) + d has consecutive vertical asymptotes at x = -2 and x = 4. Which of the following could be the value of b?",
    opts: { A: "&pi;/2", B: "&pi;/3", C: "&pi;/6", D: "6" },
    ans: "C",
    sol: "The horizontal distance between two consecutive vertical asymptotes represents one full period. The distance between -2 and 4 is 4 - (-2) = 6. Since the formula for the period is &pi; / |b|, we set 6 = &pi; / |b|. Solving for b gives |b| = &pi; / 6."
  }
];

const container = document.getElementById('quiz-container');

// Render the quiz dynamically
quizData.forEach((item, index) => {
  let optionsHtml = '';
  for (const [key, value] of Object.entries(item.opts)) {
    optionsHtml += `
      <label id="label-${index}-${key}">
        <input type="radio" name="q${index}" value="${key}"> 
        <strong>${key})</strong> ${value}
      </label>
    `;
  }

  container.innerHTML += `
    <div class="question-block" id="block-${index}">
      <div class="question-text">${item.q}</div>
      <div class="options">
        ${optionsHtml}
      </div>
      <div class="solution-box" id="solution-${index}">
        <strong>Incorrect.</strong> <br><br>
        <strong>Correct Answer:</strong> ${item.ans}) ${item.opts[item.ans]} <br><br>
        <strong>Detailed Solution:</strong> ${item.sol}
      </div>
    </div>
  `;
});

function gradeQuiz() {
  let score = 0;
  let allAnswered = true;

  // Verify all questions are answered
  quizData.forEach((item, index) => {
    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    if (!selected) allAnswered = false;
  });

  if (!allAnswered) {
    alert("Please select an answer for every question before submitting.");
    return;
  }

  // Grade and provide feedback
  quizData.forEach((item, index) => {
    const selected = document.querySelector(`input[name="q${index}"]:checked`).value;
    const solutionBox = document.getElementById(`solution-${index}`);
    
    // Reset previous highlights in case they are re-submitting
    for (const key of Object.keys(item.opts)) {
      document.getElementById(`label-${index}-${key}`).classList.remove('correct-highlight', 'incorrect-highlight');
    }

    // Apply logic for correct/incorrect
    if (selected === item.ans) {
      score++;
      document.getElementById(`label-${index}-${selected}`).classList.add('correct-highlight');
      solutionBox.style.display = "none"; 
    } else {
      document.getElementById(`label-${index}-${selected}`).classList.add('incorrect-highlight');
      document.getElementById(`label-${index}-${item.ans}`).classList.add('correct-highlight');
      solutionBox.style.display = "block"; 
    }
  });

  // Display final score banner
  const scoreDiv = document.getElementById('score-display');
  scoreDiv.style.display = "block";
  scoreDiv.innerHTML = `You scored ${score} out of ${quizData.length}!`;
  
  if (score === quizData.length) {
    scoreDiv.style.backgroundColor = "#d4edda";
    scoreDiv.style.color = "#155724";
  } else {
    scoreDiv.style.backgroundColor = "#f8d7da";
    scoreDiv.style.color = "#721c24";
    scoreDiv.innerHTML += "<br><span style='font-size:16px; font-weight: normal; margin-top: 10px; display: inline-block;'>Review the detailed solutions above for the questions you missed.</span>";
  }
  
  // Transform the button into a retake button
  const submitBtn = document.getElementById('submit-btn');
  submitBtn.innerText = "Retake Quiz";
  submitBtn.style.backgroundColor = "#2c3e50";
  submitBtn.onclick = () => location.reload();
}
</script>

</body>
</html>
